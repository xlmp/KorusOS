# grub.cfg - Configuração do GRUB para o Korus OS
# Descrição: Define o menu de boot e os parâmetros de carregamento do kernel
#            para o GRUB 2 com suporte ao protocolo Multiboot.

# Tempo de espera antes do boot automático (em segundos)
set timeout=5

# Entrada padrão do menu (0 = primeira entrada)
set default=0

# Tema e visual do menu
set menu_color_normal=white/black
set menu_color_highlight=black/white

# ==========================================================================
# Entrada do Korus OS no menu de boot
# ==========================================================================
menuentry "Korus OS - Experimental OS v0.1.0" {
    # Define o módulo Multiboot para o GRUB
    multiboot /boot/kernel.bin

    # Parâmetros de linha de comando do kernel (opcional)
    # Aqui podemos passar parâmetros para o kernel se necessário
    # module /boot/initrd.img

    # Inicia o boot
    boot
}

# ==========================================================================
# Entrada de debug/verbose
# ==========================================================================
menuentry "Korus OS - Modo Debug" {
    multiboot /boot/kernel.bin debug=1 loglevel=7
    boot
}

# ==========================================================================
# Entrada para boot da memória (caso haja problemas de disco)
# ==========================================================================
menuentry "Korus OS - Boot Minimo (sem drivers de disco)" {
    multiboot /boot/kernel.bin nodisk=1
    boot
}
